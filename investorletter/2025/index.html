<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    <title>2025 Annual Letter - Old Logan Capital</title>

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
    <link rel="manifest" href="../../site.webmanifest">

    <meta name="description" content="Old Logan Capital 2025 Annual Investor Letter">
    <meta name="theme-color" content="#F5F1E8">

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #F5F1E8;
            --dark: #1a1a1a;
            --text-muted: #5a5a5a;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #525659;
        }

        /* Desktop: Full PDF embed */
        .desktop-viewer {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .desktop-viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile: Clean viewer */
        .mobile-viewer {
            display: none;
            min-height: 100vh;
            background: var(--cream);
            padding: 0;
        }

        .pdf-embed-container {
            width: 100%;
            background: white;
            position: relative;
        }

        .pdf-embed-container iframe {
            width: 100%;
            min-height: 100vh;
            border: none;
        }

        .back-link {
            display: inline-block;
            padding: 15px 20px;
            background: var(--dark);
            color: var(--cream);
            text-decoration: none;
            font-size: 0.9rem;
            margin: 20px;
            border-radius: 6px;
            transition: opacity 0.2s ease;
        }

        .back-link:active {
            opacity: 0.8;
        }

        /* Mobile-specific styles */
        @media (max-width: 768px) {
            body, html {
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }

            .desktop-viewer {
                display: none;
            }

            .mobile-viewer {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Desktop Viewer -->
    <div class="desktop-viewer">
        <iframe src="../../assets/Annual Letters/OLC 2025 Annual Letter.pdf#toolbar=1&navpanes=1&scrollbar=1&view=FitH"></iframe>
    </div>

    <!-- Mobile Viewer -->
    <div class="mobile-viewer">
        <div class="pdf-embed-container">
            <iframe src="../../assets/Annual Letters/OLC 2025 Annual Letter.pdf#toolbar=1&navpanes=0&scrollbar=1&view=FitH"></iframe>
        </div>
        <a href="../../index.html#letters" class="back-link">← Back to Website</a>
    </div>
</body>
</html>
